<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="goldRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c87a"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="90"/>
    </clipPath>
    <radialGradient id="glow" cx="0.8" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="#e8c87a" stop-opacity="1"/>
      <stop offset="35%" stop-color="#c9a84c" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#a07830" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 金色外圈 -->
  <circle cx="100" cy="100" r="94" fill="none" stroke="url(#goldRing)" stroke-width="2"/>

  <!-- 深色背景 -->
  <circle cx="100" cy="100" r="90" fill="#0a0e1a"/>

  <!-- 右側金色光芒（大面積放射） -->
  <circle cx="100" cy="100" r="90" fill="url(#glow)" clip-path="url(#circle)"/>

  <!-- 沉思者剪影 — 極簡粗線條，只有頭+肩 -->
  <!-- 策略：用大色塊不用細線，36px 也清楚 -->
  <path clip-path="url(#circle)" fill="#0a0e1a" d="
    M 15,195
    C 15,170 25,155 40,148
    C 50,143 58,140 62,136
    L 62,125
    C 55,118 50,108 48,96
    C 46,84 48,72 54,62
    C 60,52 68,44 78,38
    C 84,34 90,32 98,32
    C 106,32 112,36 116,42
    C 120,48 122,56 122,64
    C 122,70 120,76 116,80
    C 114,82 114,86 118,90
    C 120,92 120,96 116,98
    C 114,100 112,104 114,110
    C 115,114 112,116 108,116
    C 105,117 103,120 102,126
    C 100,136 94,146 86,155
    C 78,164 72,174 68,186
    L 65,195
    Z
  "/>
</svg>
