<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d78c"/>
      <stop offset="40%" stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <clipPath id="c">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <g clip-path="url(#c)">
    <!-- 金色光芒背景（整個圓） -->
    <circle cx="100" cy="100" r="96" fill="url(#gold)"/>

    <!-- 人頭輪廓剪影（黑色，從左邊延伸，右邊是臉的輪廓線） -->
    <path d="
      M0 0
      L0 200
      L100 200
      C95 195, 88 185, 85 175
      C82 165, 80 155, 82 145
      C84 138, 90 132, 92 125
      C94 118, 92 112, 88 108
      C84 104, 78 100, 76 94
      C74 88, 76 80, 80 74
      C84 68, 90 64, 94 58
      C98 52, 100 44, 98 36
      C96 28, 92 22, 88 18
      C84 14, 78 10, 75 5
      L70 0
      Z
    " fill="#0a0e1a"/>

    <!-- 臉部輪廓邊緣微光 -->
    <path d="
      M85 175
      C82 165, 80 155, 82 145
      C84 138, 90 132, 92 125
      C94 118, 92 112, 88 108
      C84 104, 78 100, 76 94
      C74 88, 76 80, 80 74
      C84 68, 90 64, 94 58
      C98 52, 100 44, 98 36
      C96 28, 92 22, 88 18
    " stroke="#f0d78c" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- 光芒射線（從右邊照向人臉） -->
    <g opacity="0.3" stroke="#fff" stroke-width="0.8">
      <line x1="180" y1="60" x2="100" y2="55"/>
      <line x1="185" y1="90" x2="90" y2="95"/>
      <line x1="180" y1="120" x2="95" y2="118"/>
      <line x1="175" y1="150" x2="88" y2="140"/>
    </g>
  </g>

  <!-- 外圈 -->
  <circle cx="100" cy="100" r="96" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.5"/>
</svg>
