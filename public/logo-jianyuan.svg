<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d78c"/>
      <stop offset="40%" stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#b8922e"/>
    </linearGradient>
    <clipPath id="c">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <g clip-path="url(#c)">
    <!-- 整個圓底色是金色光芒 -->
    <circle cx="100" cy="100" r="96" fill="url(#gold)"/>

    <!-- 黑色區域本身就是一個人的側臉形狀（面朝右邊=面朝金光） -->
    <!-- 從左邊開始，人的後腦→頭頂→額頭→眉骨→鼻子→嘴→下巴→脖子 -->
    <path d="
      M4 100
      C4 55, 25 15, 60 6
      C70 4, 78 8, 84 16
      C90 24, 92 34, 90 44
      C88 52, 82 56, 80 60
      C78 64, 76 68, 78 72
      C80 74, 86 74, 90 72
      C94 70, 96 66, 100 62
      C104 58, 108 56, 110 58
      C112 60, 110 64, 108 68
      C106 72, 100 76, 98 80
      C96 84, 94 88, 96 92
      C98 96, 104 98, 106 102
      C108 106, 106 112, 100 116
      C94 120, 88 126, 84 132
      C80 138, 76 146, 74 154
      C72 162, 68 172, 62 180
      C56 190, 40 196, 20 196
      C10 196, 4 180, 4 160
      Z
    " fill="#0a0e1a"/>
  </g>

  <!-- 外圈 -->
  <circle cx="100" cy="100" r="96" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>
