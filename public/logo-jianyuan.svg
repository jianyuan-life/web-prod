<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gold" x1="0.3" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0d78c"/>
      <stop offset="50%" stop-color="#e8c97a"/>
      <stop offset="100%" stop-color="#b8922e"/>
    </linearGradient>
    <clipPath id="c">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <g clip-path="url(#c)">
    <!-- 金色光芒背景 -->
    <circle cx="100" cy="100" r="96" fill="url(#gold)"/>

    <!-- 人頭側面剪影（深色）——額頭、鼻子、嘴巴、下巴、後腦勺 都要明顯 -->
    <path d="
      M0 0 L0 200 L70 200
      C70 190, 72 180, 75 172
      C78 164, 82 158, 80 150
      C78 144, 72 140, 70 134
      C68 128, 72 122, 78 118
      L82 114
      L78 110
      C72 106, 66 100, 64 94
      C62 88, 60 82, 62 76
      L68 68
      C74 60, 82 54, 88 50
      C94 46, 100 40, 104 32
      C108 24, 106 16, 100 10
      C94 4, 86 2, 76 0
      Z
    " fill="#0a0e1a"/>

    <!-- 臉部輪廓高光邊緣 -->
    <path d="
      M75 172
      C78 164, 82 158, 80 150
      C78 144, 72 140, 70 134
      C68 128, 72 122, 78 118
      L82 114
      L78 110
      C72 106, 66 100, 64 94
      C62 88, 60 82, 62 76
      L68 68
      C74 60, 82 54, 88 50
      C94 46, 100 40, 104 32
    " stroke="#f5e0a0" stroke-width="2" fill="none" opacity="0.5"/>
  </g>

  <!-- 外圈 -->
  <circle cx="100" cy="100" r="96" stroke="#c9a84c" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>
