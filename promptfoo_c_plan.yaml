# 鑑源 C 方案(人生藍圖)v5.5.0 promptfoo evaluation gate
# 對應 9 P0(P0-3 / P0-4 / P0-5 / P0-7 / P0-8 / P0-9 / P0-10 / P0-11 / P0-12)
# 業界共識 SOP:prompt 改動必須 ≥ 90% 通過率才能 ship
# 對應 _audit_2026-04-27/FINAL_AUDIT_REPORT_2026-04-27.md
#
# 測試策略:用 c_plan_v2.ts buildCall3Prompt 對應的「Call 3 集大成」段做檢驗
# Call 3 = 矩陣 / TOP 5 / ASCII 曲線 / 古籍引用、最容易命中 P0 結構性 assertion
#
# 使用方式:
#   export ANTHROPIC_API_KEY=$CLAUDE_API_KEY  # 或從 .env.local 取
#   npx promptfoo eval -c promptfoo_c_plan.yaml --max-concurrency 1
#
# 預估成本:1 次 eval ≈ $0.5-1 USD(Claude Opus 4.7、3-call 接力 / 但本 fixture 只跑 Call 3 簡化版 ~ $0.5)
# 預估時間:60-180 秒 / test

description: 鑑源 C 方案(人生藍圖)v5.5.0 — 9 P0 + 起承轉合 + 反回歸 共 11 assertion

providers:
  - id: anthropic:messages:claude-opus-4-7
    config:
      # apiKey 自動從 ANTHROPIC_API_KEY env 變數讀(不寫死、避免 commit 洩漏)
      # max_tokens 12000 在 Windows 環境會 SSL connection timeout、降至 8000 + 開 stream
      max_tokens: 8000
      # temperature 1.0 在 Opus 4.7 deprecated、不寫(使用預設)
      stream: true

prompts:
  - |
    你是鑑源命理平台的首席命理顧問。為付費客戶撰寫「人生藍圖」報告 Call 3 集大成段。

    ═══════════════════════════════════════════════════════════════
    🔴 v5.5 雙軌策略(P0-7、最高優先)
    ═══════════════════════════════════════════════════════════════

    本段同時服務:
    - **UI 段**(網頁端):白話、術語密度 < 5%、不出現「(八字偏印格 + 吠陀水星旺)」這類括號內系統術語背書
    - **PDF 段**(深度版):每章末加「📚 命理深析」、含 1-2 條古籍原文 + 派別考據
    - 兩者**互補不重複**、UI 不堆學術術語、PDF 不重寫 UI 白話

    ═══════════════════════════════════════════════════════════════
    🚫 P0-4 「—」hard schema check
    ═══════════════════════════════════════════════════════════════

    任何欄位**禁寫**「—」「N/A」「無資料」「待補」、缺值必繞著寫白話內容。

    ═══════════════════════════════════════════════════════════════
    🔮 P0-3 靈數悖論明文
    ═══════════════════════════════════════════════════════════════

    若客戶同時出現「命運數=5」+「缺數=5」、必須用明文點出**「內心撕裂、命運要求變化、但天生抗拒變化」**的核心矛盾,不能分別陳述兩個事實了事。

    ═══════════════════════════════════════════════════════════════
    ⚙️ 客戶資料(命盤摘要、非完整 raw_data、僅供本測試 fixture)
    ═══════════════════════════════════════════════════════════════

    {{birth_data}}

    ═══════════════════════════════════════════════════════════════

    請依下列順序產出 Call 3 集大成段(目標 9000-12000 字):

    ## 九、十五系統交叉驗證矩陣(P0-8、必填、不可「—」)

    用 markdown 表格、7 個人生面向 × 15 個系統 ★ 評級。

    | 面向 | 八字 | 紫微 | 奇門 | 風水 | 姓名 | 西占 | 吠陀 | 易經 | 人類圖 | 塔羅 | 數字 | 古占 | 生肖 | 節律 | 南洋 | 共識度 |
    |:---|:---:|:---:|:---:|:---:|:---:|:---:|:---:|:---:|:---:|:---:|:---:|:---:|:---:|:---:|:---:|:---:|

    7 個面向(財運 / 事業 / 感情 / 健康 / 人際 / 學習 / 心靈)每個都填、共 7 行 × 15 系統 = **105 個 ★ 格**(必滿)。

    ★ 評級:★ ~ ★★★★★(對應弱訊號到極強共識)。共識度:🟢 高 / 🟡 中 / 🔴 低。

    矩陣後寫 200-300 字解讀:最強共識面向、最分歧面向、核心訊息。

    ---

    ## 十、TOP 5 優勢(P0-10、必 5 條)

    每條:**標題** / 支持系統(≥3 系統) / **信心度 ●●●●○**(5 點) / 具體展現 / 怎麼放大。

    ---

    ## 十一、TOP 5 風險(P0-10、必 5 條)

    每條:**標題** / 支持系統(≥3) / **信心度 ●●●●○** / 何時最容易爆發 / 預防方案。

    ---

    ## 十二、三階段行動計畫

    即刻 / 短期 / 長期、每階段 3-5 條具體行動、章節間有過渡語呼應前文(起承轉合)。

    ---

    ## 十三、年度運勢曲線(2026、P0-9 ASCII 曲線必繪)

    用 ``` code block 畫 12 月運勢曲線、含 1月 / 2月 / 3月 ... 12月 標籤、★ 高低點。

    然後用 markdown 表格列 12 月 ★ 評分(每行:整體 / 財運 / 事業 / 感情 / 健康 / 重點主題、12 行不可缺)。

    ---

    ## 十四、幸運參數速查表(8 行、不可「—」)

    | 類別 | 你的最佳參數 | 命理依據 |
    8 行(顏色 / 數字 / 方位 / 時段 / 植物寵物 / 避忌 / 吉星凶神 / 運動嗜好)。

    ---

    ## 十五、給你的一句話

    一句衝擊性核心洞見、附 2-3 句命理依據解釋。

    ---

    ## 十六、刻意練習(必 5-7 個、每個含命格依據 + 不做痛點 + 做了願景)

    ---

    ## 十七、寫給{{client_name}}的話

    四段:回顧過去 / 看見現在 / 展望未來 / 力量宣告、必含古籍原文引用(《》書名號)。

    ---

    🆕 v5.5 P0-12 古籍引用密度:整段必含 ≥ 15 條《古籍》引用(每系統至少 1 條)、用《書名》格式。

    🆕 v5.5 P0-11 紫微雙星詮釋:若提到紫微、必引《紫微斗數全書》卷二〈諸星論〉或卷三〈諸格論〉。

tests:
  - description: C 方案 v5.5.0 集大成段 9 P0 完整驗證
    vars:
      client_name: 何宣逸
      birth_data: |
        【命主】何宣逸(男)、1990 年 1 月 15 日 14:30 出生於台北
        【八字】己巳 / 丁丑 / 戊午 / 己未(戊土日主、火土旺)
        【紫微】命宮天機巨門在卯、身宮天梁在亥(機巨同宮、口才好但是非多)
        【奇門】今日值符天英 / 值使景門、年命宮坤二
        【生命靈數】命運數 5 / 缺數 5(★ 經典悖論案例)
        【人類圖】Manifesting Generator 6/2(角色 6/2 顯示生產者)
        【吠陀】Cancer Lagna、Moon in Scorpio(月亮在天蠍、深沉敏感)
        【西占】Capricorn Sun、Mars in Aries 9 宮(摩羯太陽 + 火星牡羊在 9 宮)
        【其他系統】風水東四命(震)、姓名筆劃 7-9-15(土生金)、易經乾為天卦、塔羅愚人牌、古占射手、生肖馬、節律 23/28/33、南洋占星 Pisces ascendant
        【大運】2026 起癸酉大運(食神坐七殺、35 歲關鍵轉折)

    assert:
      # === 結構性 deterministic assertion(11 個中的 5 個) ===

      # 1. P0-4 「—」hard check(任何欄位空白都不行)
      - type: not-contains
        value: " — "

      # 2. P0-4 沒有「N/A」或「無資料」placeholder
      - type: javascript
        value: |
          const banned = ['N/A', '(無資料)', '無資料', '待補', '...(依命盤填)'];
          const hits = banned.filter(b => output.includes(b));
          if (hits.length === 0) return true;
          return { pass: false, reason: `命中禁用占位符:${hits.join(', ')}` };

      # 3. P0-8 矩陣完整(7 面向 × 15 系統 = 105 個 ★ 格)
      - type: javascript
        value: |
          const stars = (output.match(/★/g) || []).length;
          // 矩陣 105 + TOP 5 優勢 5 條 ●●●●○ + TOP 5 風險 5 條 + 12 月 ★ 表 ~72 個
          // 保守估計矩陣本身 105、其餘 80+、總 ★ ≥ 180 才合格
          if (stars >= 180) return true;
          return { pass: false, reason: `★ 數量 ${stars} < 180、矩陣可能不完整` };

      # 4. P0-9 ASCII 年度曲線(必含 ``` code block + 12 個月份標籤)
      - type: javascript
        value: |
          const hasCodeBlock = /```[\s\S]*?(1\s*月|1月)[\s\S]*?(12\s*月|12月)[\s\S]*?```/.test(output);
          const monthLabels = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
          const monthsFound = monthLabels.filter(m => output.includes(m)).length;
          if (hasCodeBlock && monthsFound >= 12) return true;
          return { pass: false, reason: `ASCII 曲線:hasCodeBlock=${hasCodeBlock}、12 月標籤命中 ${monthsFound}/12` };

      # 5. P0-10 TOP 5 優勢 + 風險 + 信心度 ●●●●○ 至少 10 次
      - type: javascript
        value: |
          const dotCount = (output.match(/●●●/g) || []).length;
          if (dotCount >= 10) return true;
          return { pass: false, reason: `信心度 ●●● 命中 ${dotCount} < 10、TOP 5 優勢+風險不齊` };

      # 6. P0-12 古籍引用密度(《書名》≥ 15 次、15 系統各 ≥ 1 條)
      - type: javascript
        value: |
          const guji = (output.match(/《[^》]{2,30}》/g) || []);
          const unique = new Set(guji);
          if (guji.length >= 15) return true;
          return { pass: false, reason: `古籍引用 ${guji.length} < 15(unique=${unique.size})、不滿 15 系統各 1 條` };

      # === LLM-rubric assertion(質性、6 個) ===

      # 7. P0-3 靈數悖論明文(命數 5 + 缺數 5 同時出現時必須點出撕裂)
      - type: llm-rubric
        value: |
          報告若同時提到「命運數 5」+「缺數 5」(本測試 fixture 必含)、必須在某段落用**明文**點出「內心撕裂 / 命運要求變化但天生抗拒變化 / 自我矛盾」這類核心衝突描述、不能只分別陳述兩個事實。
          通過條件:
          - 找到「命運數=5」+「缺數=5」的同時陳述、且
          - 後文有解釋「為什麼這兩個一樣會造成內心衝突 / 撕裂 / 矛盾」(用詞如「撕裂」「矛盾」「衝突」「自我對抗」「對立」皆可)。
          評分標準:命中 = pass、未命中 = fail。

      # 8. P0-5 + P0-11 UI 白話化(術語密度 < 5%、不出現括號背書)
      - type: llm-rubric
        value: |
          檢查報告中標示為「UI 段 / 網頁端 / 一針見血」的部分(若有 emoji 標題或「### 一句話」之類引導語)、**禁出現**:
          (a) 命理術語密度 ≥ 5%(如連續出現「七殺」「偏印格」「水星旺」「Manifesting Generator」等)
          (b) 括號內系統術語背書、如「(八字偏印格 + 吠陀水星旺)」
          (c) 過長學術引用塞進 UI 段
          通過條件:UI 段語感白話、PDF 段才放術語、檢驗者可清楚分辨兩段風格差異。

      # 9. P0-7 雙軌策略反向錯位(UI 白話 / PDF 專業互補不重複)
      - type: llm-rubric
        value: |
          檢查報告整體有無遵守「UI 段給不懂命理的客戶 / PDF 段給有命理基礎的讀者」雙軌:
          - UI 段(章節主文)應白話、客戶能讀懂
          - PDF 段(每章末「📚 命理深析」或「PDF 專屬」標記)應有古籍原文 + 派別考據
          - 兩段內容應**互補不重複**、UI 不堆學術術語、PDF 不重寫 UI 白話內容
          通過條件:報告中能找到 ≥ 3 處明顯的雙軌結構(同章 UI / PDF 兩段並列)。

      # 10. 起承轉合 narrative(章節間有過渡語、整體有故事弧線)
      - type: llm-rubric
        value: |
          檢查 Call 3 各章節(九-十七)是否有起承轉合 narrative:
          - 章節間有**過渡語**(如「前面看完優勢、接下來看風險」「了解風險後、就要行動」這類橋接句)
          - **避免章節間跳躍**(直接從「TOP 5 優勢」跳到「年度曲線」沒有任何過渡語 = fail)
          - 整體報告有 arc(從矩陣總覽 → 提取優勢 / 風險 → 行動 → 時間 → 結語)
          通過條件:能找到 ≥ 4 處明顯的章節過渡語。

      # === 防回歸 assertion(2 個) ===

      # 11. token 上限(避免報告過短或過長、9000-15000 字目標)
      - type: javascript
        value: |
          const wordCount = output.replace(/\s/g, '').length;
          if (wordCount >= 6000 && wordCount <= 18000) return true;
          return { pass: false, reason: `字數 ${wordCount} 超出 6000-18000 範圍(目標 9000-15000、Call 3 集大成)` };

defaultTest:
  options:
    provider:
      id: anthropic:messages:claude-opus-4-7
      config:
        # apiKey 從 env 自動讀
        max_tokens: 4000
        temperature: 0.3

# 90% gate 設定(11 assertion 中至少 ≥ 10 通過 = ≥ 90.9%)
# 透過 promptfoo --threshold 跑、或人工計算
