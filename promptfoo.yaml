# 鑑源 v5.4.0 promptfoo evaluation gate(2026-04-26、v5.5 基建)
# 業界共識 SOP:prompt 改動必須 ≥ 90% 通過才能 ship
# 對齊 Codex P1 finding + Gemini 建議 + CLAUDE.md 第 7 條鐵律「基建是地基」
# 用 DeepSeek-Chat provider(API key 已配置在 ~/.claude/.env)

description: 鑑源 v5.4.0 第二階段 prompt evaluation smoke test

providers:
  - id: google:gemini-2.5-flash
    config:
      apiKey: ${GEMINI_API_KEY}
      generationConfig:
        maxOutputTokens: 800
        temperature: 0.3

prompts:
  - |
    你是鑑源命理平台首席顧問。請依以下排盤生成簡短紫微報告(限 300 字):

    【紫微 raw_data】
    命主:{{ming_zhu}}
    身主:{{shen_zhu}}
    流年斗君:{{dou_jun_palace}}

    必須包含:命主 X、身主 X、流年斗君 X 三個本命指標解讀。
    依《紫微斗數全書》卷二〈安命主訣〉+〈安身主訣〉。

tests:
  - description: 紫微命主/身主/斗君三核心必含
    vars:
      ming_zhu: 貪狼
      shen_zhu: 火星
      dou_jun_palace: 命宮
    assert:
      - type: contains
        value: 命主
      - type: contains
        value: 身主
      - type: contains-any
        value:
          - 斗君
          - 流年

  - description: 紫微報告 35 歲分界(命主前 / 身主後)
    vars:
      ming_zhu: 武曲
      shen_zhu: 天梁
      dou_jun_palace: 財帛
    assert:
      - type: contains-any
        value:
          - 35 歲
          - 35歲
          - 中年
          - 上半場
          - 後半場
          - 前主導
          - 後顯化

defaultTest:
  threshold: 0.7

# 實際跑:
#   set DEEPSEEK_API_KEY=...(已配 ~/.claude/.env)
#   cd Claude-鑑源網頁製作部門
#   promptfoo eval --no-cache
